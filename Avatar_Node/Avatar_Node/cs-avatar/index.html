<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cs-avatar</title>
  </head>
  <body>
  <div id="ui">
    <div id="chatLog"></div>

    <div id="controls">
      <button id="micBtn" title="Speak your question">🎤</button>
      <input id="textInput" placeholder="Ask a question…" />
      <button id="sendBtn">Send</button>
    </div>

    <div id="status"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
<style>
  #ui{
    position: fixed;
    left: 16px;
    bottom: 16px;
    width: min(520px, calc(100vw - 32px));
    font-family: system-ui, Arial, sans-serif;
    z-index: 10;
  }
  #chatLog{
    max-height: 260px;
    overflow: auto;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .msg{ margin: 6px 0; }
  .me{ font-weight: 600; }
  #controls{
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px;
  }
  #textInput{
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.2);
    outline: none;
  }
  #micBtn, #sendBtn{
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.9);
    cursor: pointer;
  }
  #status{
    margin-top: 8px;
    font-size: 12px;
    color: rgba(0,0,0,0.7);
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    padding: 6px 10px;
    display: inline-block;
  }
</style>
</html>
